version: "3.9"

services:
  app:
    build:
      context: ./docker/php
    container_name: pos_app
    volumes:
      - ./src:/var/www
    depends_on:
      - db

  web:
    image: nginx:latest
    container_name: pos_web
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    build:
      context: ./docker/postgres
    container_name: pos_db
    restart: always
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: